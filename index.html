<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyApxbTH_SHEbDa610HEfdrGS1TRLF3m_ro",
  authDomain: "seguimientolecres.firebaseapp.com",
  projectId: "seguimientolecres",
  storageBucket: "seguimientolecres.firebasestorage.app",
  messagingSenderId: "867043568083",
  appId: "1:867043568083:web:63ce523973e4745dbea726"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

// ── Guardar en Firestore ──────────────────────────────────────
async function saveToCloud(cursoId, data) {
  try {
    await setDoc(doc(db, "cursos", cursoId), data);
  } catch(e) { console.error("Error guardando:", e); }
}

// ── Escuchar cambios en tiempo real ───────────────────────────
function listenCurso(cursoId, cb) {
  return onSnapshot(doc(db, "cursos", cursoId), snap => {
    if (snap.exists()) cb(snap.data());
  });
}

// ── Cargar todos los cursos al arrancar ───────────────────────
async function loadAll() {
  try {
    const snap = await getDocs(collection(db, "cursos"));
    snap.forEach(d => {
      const data = d.data();
      if (S.cursos[d.id]) {
        S.cursos[d.id].alumnos = data.alumnos || S.cursos[d.id].alumnos;
        S.cursos[d.id].notas   = data.notas   || {};
      } else {
        S.cursos[d.id] = { nombre: d.id, alumnos: data.alumnos || [], notas: data.notas || {} };
      }
    });
  } catch(e) { console.error("Error cargando:", e); }
  setStatus('online');
  render();
  // Escuchar en tiempo real el curso activo
  startListening();
}

// ── Listeners en tiempo real ──────────────────────────────────
let unsubscribers = {};
function startListening() {
  Object.keys(S.cursos).forEach(cid => {
    if (unsubscribers[cid]) return;
    unsubscribers[cid] = listenCurso(cid, data => {
      if (!S._saving) {   // ignorar eco de nuestro propio guardado
        S.cursos[cid].alumnos = data.alumnos || S.cursos[cid].alumnos;
        S.cursos[cid].notas   = data.notas   || {};
        if (!S._inputting) render();
        flashSync();
      }
    });
  });
}
function stopListeners() {
  Object.values(unsubscribers).forEach(u => u());
  unsubscribers = {};
}

// ── Cola de guardado con debounce ─────────────────────────────
let saveTimer = null;
function scheduleSave(cursoId) {
  clearTimeout(saveTimer);
  setStatus('saving');
  saveTimer = setTimeout(async () => {
    S._saving = true;
    const c = S.cursos[cursoId];
    await saveToCloud(cursoId, { alumnos: c.alumnos, notas: c.notas });
    S._saving = false;
    setStatus('saved');
    setTimeout(() => setStatus('online'), 2000);
  }, 900);
}

function setStatus(s) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    loading: ['⏳', 'Conectando…',  '#8898bb'],
    online:  ['☁️', 'Sincronizado', '#16a34a'],
    saving:  ['💾', 'Guardando…',   '#d97706'],
    saved:   ['✅', 'Guardado',     '#16a34a'],
    offline: ['⚠️', 'Sin conexión', '#dc2626'],
  };
  const [icon, txt, color] = map[s] || map.online;
  el.innerHTML = `<span>${icon}</span><span style="color:${color};font-weight:700">${txt}</span>`;
}
function flashSync() {
  const el = document.getElementById('sync-status');
  if (el) { el.style.opacity='0.4'; setTimeout(()=>el.style.opacity='1', 300); }
}

// Exponer para uso global
window._db = { saveToCloud, scheduleSave, startListening, loadAll, setStatus };
</script>

<script>
// ══════════════════════════════════════════════════════════════
// CONSTANTES
// ══════════════════════════════════════════════════════════════
const CATS=[
  {key:'vl',  label:'Velocidad Lectora',      short:'VL',  color:'#4f7ef8',multi:false},
  {key:'cl',  label:'Comprensión Lectora',     short:'CL',  color:'#8b5cf6',multi:false},
  {key:'eo',  label:'Expresión Oral',          short:'EO',  color:'#14b8a6',multi:false},
  {key:'calc',label:'Cálculo',                 short:'CALC',color:'#f59e0b',multi:true },
  {key:'rp',  label:'Resolución de Problemas', short:'RP',  color:'#ef4444',multi:true },

// ESTADO
// ══════════════════════════════════════════════════════════════
let S={
  cursos:{}, ca:'5º', ta:0, vista:'notas',
  ae:null, agraf:{},
  _saving:false, _inputting:false,
};
Object.entries(INIT).forEach(([k,lista])=>{
  S.cursos[k]={nombre:k, alumnos:lista.map(n=>({id:uid(),nombre:n})), notas:{}};
});

// ── helpers ───────────────────────────────────────────────────
function curso(){return S.cursos[S.ca]}
function alumnos(){return curso()?.alumnos||[]}
function getN(aid,ti){return curso()?.notas[aid]?.[ti]||defN()}
function setN(aid,ti,fn){
  const c=curso();if(!c)return;
  c.notas[aid]=c.notas[aid]||{};
  c.notas[aid][ti]=c.notas[aid][ti]||defN();
  fn(c.notas[aid][ti]);
  window._db?.scheduleSave(S.ca);
  render();
}
function calcMedia(arr){
  const v=arr.filter(x=>x!==''&&!isNaN(parseFloat(x)));
  if(!v.length)return null;
  return v.reduce((a,b)=>a+parseFloat(b),0)/v.length;
}
function notaFinal(n,k){
  if(!n)return null;
  const cat=CATS.find(c=>c.key===k);
  if(cat.multi)return calcMedia(n[k]||[]);
  const v=n[k]; return(v===''||v==null)?null:parseFloat(v);
}
function mediaClase(cid,ti,k){
  const c=S.cursos[cid];if(!c)return null;
  const vs=c.alumnos.map(al=>{const n=c.notas[al.id]?.[ti];return notaFinal(n,k);}).filter(v=>v!==null&&!isNaN(v));
  if(!vs.length)return null;
  return+(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(2);
}
function fmt(v){
  if(v===null||v===undefined||isNaN(v))return'–';
  const n=parseFloat(v);
  return n%1===0?n.toFixed(0):parseFloat(n.toFixed(2)).toString();
}
function pillCls(v){
  if(v===null||isNaN(v))return'pe';
  const n=parseFloat(v);
  if(n>=9)return'pt';if(n>=7)return'pn';if(n>=5)return'pm';return'pb';
}
function distrib(cid,ti,k){
  const c=S.cursos[cid];if(!c)return null;
  let top=0,bien=0,medio=0,bajo=0;
  c.alumnos.forEach(al=>{
    const n=c.notas[al.id]?.[ti];
    const v=notaFinal(n,k);
    if(v===null||isNaN(v))return;
    if(v>=9)top++;else if(v>=7)bien++;else if(v>=5)medio++;else bajo++;
  });
  return{top,bien,medio,bajo,total:c.alumnos.length};
}

// ── charts ────────────────────────────────────────────────────
let charts=[];
function destroyCharts(){charts.forEach(c=>c.destroy());charts=[];}
const gOpts={
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{font:{family:'Nunito',weight:'700',size:11},color:'#4a5a80',boxWidth:12}}},
  scales:{
    x:{ticks:{color:'#8898bb',font:{family:'Nunito',size:11}},grid:{color:'rgba(150,170,210,0.15)'}},
    y:{min:0,max:10,ticks:{color:'#8898bb',font:{family:'Nunito',size:11}},grid:{color:'rgba(150,170,210,0.15)'}},
  }
};

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function render(){
  destroyCharts();
  renderChips();
  const mc=document.getElementById('mc');
  if(!mc)return;
  if(S.vista==='notas')      mc.innerHTML=viewNotas();
  else if(S.vista==='graficas') mc.innerHTML=viewGraficas();
  else                          mc.innerHTML=viewResumen();
  bind();
  if(S.vista==='graficas') buildGrafCharts();
  if(S.vista==='resumen')  buildResCharts();
}

function renderChips(){
  const cc=document.getElementById('curso-chips');
  if(!cc)return;
  cc.innerHTML='';
  Object.keys(S.cursos).forEach(id=>{
    const b=document.createElement('button');
    b.className='chip'+(id===S.ca?' active':'');
    b.textContent=id;
    b.onclick=()=>{S.ca=id;S.ae=null;S.agraf={};render();};
    cc.appendChild(b);
  });
  const tc=document.getElementById('trim-chips');
  tc.innerHTML='';
  TS.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='chip tri'+(i===S.ta?' active':'');
    b.textContent=t;
    b.onclick=()=>{S.ta=i;render();};
    tc.appendChild(b);
  });
  document.getElementById('toolbar').style.display=S.vista==='resumen'?'none':'flex';
}

// ── VIEW NOTAS ────────────────────────────────────────────────
function viewNotas(){
  const c=curso();if(!c)return'';
  if(S.ae)return editorAlumno();
  const als=alumnos();
  const rows=als.length?als.map((al,i)=>{
    const n=getN(al.id,S.ta);
    const pills=CATS.map(cat=>{
      const v=notaFinal(n,cat.key);
      return`<span class="pill ${pillCls(v)}">${cat.short}:${fmt(v)}</span>`;
    }).join('');
    const ini=al.nombre.split(/[\s,]+/).filter(Boolean).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    return`<div class="arow glass-row" data-id="${al.id}">
      <div class="av av${i%6}">${ini}</div>
      <span class="aname">${al.nombre}</span>
      <div class="pills">${pills}</div>
    </div>`;
  }).join(''):`<p style="color:var(--text3);text-align:center;padding:36px 0;font-size:13px">Sin alumnos. Añade el primero ↓</p>`;
  return`<div class="card glass">
    <div class="ct">📋 ${S.ca} · ${TRIMS[S.ta]}
      <span style="margin-left:auto;font-size:11px;color:var(--text3);font-weight:600">${als.length} alumnos</span>
    </div>
    ${rows}
    <div style="margin-top:13px;display:flex;gap:7px;flex-wrap:wrap">
      <button class="btnp" id="btn-addal">＋ Alumno</button>
      <button class="btnd" id="btn-vaciarcl">🗑 Vaciar clase</button>
    </div>
  </div>`;
}

// ── EDITOR ALUMNO ─────────────────────────────────────────────
function editorAlumno(){
  const als=alumnos();
  const idx=als.findIndex(a=>a.id===S.ae);
  const al=als[idx];if(!al)return'';
  const n=getN(al.id,S.ta);
  const trimTabs=TS.map((t,i)=>`<button class="chip tri${i===S.ta?' active':''}" data-trim="${i}">${t}</button>`).join('');
  const catBlocks=CATS.map(cat=>{
    if(cat.multi){
      const arr=n[cat.key]||[];
      const med=calcMedia(arr);
      const medH=med!==null?`<span class="cmedia">Media: ${fmt(med)}</span>`:'';
      const warn=arr.length<2?`<p class="cwarn">⚠ Mínimo 2 notas para la media</p>`:'';
      const rows=arr.map((v,i)=>`<div class="mrow">
        <span class="mlbl">Nota ${i+1}</span>
        <input class="ninput nmulti" type="number" inputmode="decimal" min="0" max="10" step="0.01" value="${v}" data-cat="${cat.key}" data-idx="${i}" placeholder="0–10"/>
        <button class="btnrm" data-cat="${cat.key}" data-idx="${i}">✕</button>
      </div>`).join('');
      const addBtn=arr.length<8?`<button class="btnadd" data-cat="${cat.key}">＋ Añadir nota</button>`:'';
      return`<div class="catb"><div class="cath"><span class="cdot" style="background:${cat.color}"></span><span class="cname">${cat.label}</span>${medH}</div>${rows}${addBtn}${warn}</div>`;
    }else{
      return`<div class="catb"><div class="cath"><span class="cdot" style="background:${cat.color}"></span><span class="cname">${cat.label}</span></div>
        <input class="ninput nsimple" type="number" inputmode="decimal" min="0" max="10" step="0.01" value="${n[cat.key]}" data-cat="${cat.key}" placeholder="0–10"/>
      </div>`;
    }
  }).join('');
  return`<div class="card glass">
    <div class="ehead">
      <button class="btnback" id="btn-back">←</button>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${al.nombre}</div>
        <div style="font-size:11px;color:var(--text3)">${S.ca} · alumno ${idx+1} de ${als.length}</div>
      </div>
      <div class="nav-al">
        <button class="bna" id="btn-prev" ${idx<=0?'disabled':''}>‹</button>
        <span class="napos">${idx+1}/${als.length}</span>
        <button class="bna" id="btn-next" ${idx>=als.length-1?'disabled':''}>›</button>
      </div>
    </div>
    <div class="cg" style="margin-bottom:16px;gap:5px">${trimTabs}</div>
    ${catBlocks}
  </div>`;
}

// ── VIEW GRÁFICAS ─────────────────────────────────────────────
function viewGraficas(){
  const c=curso();if(!c)return'';
  const als=alumnos();
  const toggles=als.map((al,i)=>{
    const on=S.agraf[al.id];
    return`<button class="at${on?' on':''}" data-alid="${al.id}" style="${on?`background:${ACOLS[i%ACOLS.length]};border-color:${ACOLS[i%ACOLS.length]}`:''}">${al.nombre.split(',')[0]}</button>`;
  }).join('');
  const hasInd=als.some(a=>S.agraf[a.id]);
  const indCharts=hasInd?CATS.map(c=>`<div style="margin-bottom:18px">
    <div style="font-size:11px;font-weight:800;color:${c.color};margin-bottom:6px;font-family:'Nunito',sans-serif">${c.label}</div>
    <div class="chart-wrap chart-sm"><canvas id="ind-${c.key}"></canvas></div>
  </div>`).join(''):`<p style="color:var(--text3);font-size:13px;text-align:center;padding:18px 0">Selecciona alumnos para ver su evolución</p>`;
  const donuts=CATS.map(cat=>`<div class="dcard">
    <div class="dl" style="color:${cat.color}">${cat.label}</div>
    <div style="position:relative;height:150px"><canvas id="don-${cat.key}"></canvas></div>
  </div>`).join('');
  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card glass">
      <div class="ct">📊 Medias trimestrales — ${S.ca}</div>
      <div class="chart-wrap"><canvas id="ch-evol"></canvas></div>
    </div>
    <div class="card glass">
      <div class="ct">🍩 Distribución por nivel — ${TRIMS[S.ta]}</div>
      <p style="font-size:11px;color:var(--text3);margin-bottom:12px">% de alumnos: 🟢≥9 · 🔵≥7 · 🟡≥5 · 🔴&lt;5</p>
      <div class="dgrid">${donuts}</div>
    </div>
    <div class="card glass">
      <div class="ct">📈 Comparativa por barras</div>
      <div class="chart-wrap"><canvas id="ch-barras"></canvas></div>
    </div>
    <div class="card glass">
      <div class="ct">👤 Evolución individual</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">${toggles}</div>
      ${indCharts}
    </div>
  </div>`;
}

function buildGrafCharts(){
  const c=curso();if(!c)return;
  const elEv=document.getElementById('ch-evol');
  if(elEv){
    charts.push(new Chart(elEv,{type:'line',data:{labels:TS,datasets:CATS.map(cat=>({
      label:cat.short,data:TS.map((_,ti)=>mediaClase(S.ca,ti,cat.key)),
      borderColor:cat.color,borderWidth:2.5,pointRadius:5,pointHoverRadius:7,
      tension:0.35,fill:false,spanGaps:true,backgroundColor:cat.color+'22',
    }))},options:gOpts}));
  }
  const elBar=document.getElementById('ch-barras');
  if(elBar){
    charts.push(new Chart(elBar,{type:'bar',data:{labels:TS,datasets:CATS.map(cat=>({
      label:cat.short,data:TS.map((_,ti)=>mediaClase(S.ca,ti,cat.key)),
      backgroundColor:cat.color+'bb',borderColor:cat.color,borderWidth:1.5,borderRadius:7,
    }))},options:gOpts}));
  }
  CATS.forEach(cat=>{
    const el=document.getElementById(`don-${cat.key}`);if(!el)return;
    const d=distrib(S.ca,S.ta,cat.key);if(!d)return;
    const tot=d.top+d.bien+d.medio+d.bajo;
    const pct=v=>tot?Math.round(v/tot*100):0;
    charts.push(new Chart(el,{type:'doughnut',
      data:{labels:[`≥9 (${pct(d.top)}%)`,`7-9 (${pct(d.bien)}%)`,`5-7 (${pct(d.medio)}%)`,`<5 (${pct(d.bajo)}%)`],
        datasets:[{data:[d.top,d.bien,d.medio,d.bajo],backgroundColor:['#22c55e','#3b82f6','#f59e0b','#ef4444'],borderWidth:2,borderColor:'rgba(255,255,255,0.8)'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{font:{family:'Nunito',weight:'700',size:9},color:'#4a5a80',boxWidth:10,padding:5}},
          tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed;const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return t?` ${Math.round(v/t*100)}% (${v} alumnos)`:' 0%';}}}
        }}
    }));
  });
  const als=alumnos().filter(a=>S.agraf[a.id]);
  if(als.length){
    CATS.forEach(cat=>{
      const el=document.getElementById(`ind-${cat.key}`);if(!el)return;
      charts.push(new Chart(el,{type:'line',data:{labels:TS,datasets:als.map((al,i)=>({
        label:al.nombre.split(',')[0],
        data:TS.map((_,ti)=>{const n=c.notas[al.id]?.[ti];return notaFinal(n,cat.key);}),
        borderColor:ACOLS[i%ACOLS.length],backgroundColor:ACOLS[i%ACOLS.length]+'22',
        borderWidth:2,pointRadius:4,tension:0.3,spanGaps:true,
      }))},options:gOpts}));
    });
  }
}

  const catCharts=CATS.map(cat=>`<div class="card glass">
    <div class="ct"><span style="width:9px;height:9px;border-radius:50%;background:${cat.color};display:inline-block"></span>${cat.label}</div>
    <div class="chart-wrap"><canvas id="res-${cat.key}"></canvas></div>
  </div>`).join('');
  const radares=cids.map(cid=>`<div class="dcard">
    <div class="dl" style="color:var(--accent)">${cid}</div>
    <div style="position:relative;height:170px"><canvas id="rad-${cid.replace('º','g')}"></canvas></div>
  </div>`).join('');
  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card glass" style="padding-bottom:8px">
      <div class="ct">🏫 Perfil por curso — ${TRIMS[S.ta]}</div>
      <div class="dgrid">${radares}</div>
    </div>
    ${catCharts}
  </div>`;
}

function buildResCharts(){
  const cids=Object.keys(S.cursos);
  const colors=['#4f7ef8','#8b5cf6','#14b8a6','#f59e0b','#ef4444','#22c55e'];
  cids.forEach((cid,ci)=>{
    const key=cid.replace('º','g');
    const el=document.getElementById(`rad-${key}`);if(!el)return;
    const vals=CATS.map(cat=>mediaClase(cid,S.ta,cat.key)??0);
    charts.push(new Chart(el,{type:'radar',
      data:{labels:CATS.map(c=>c.short),datasets:[{label:cid,data:vals,borderColor:colors[ci%colors.length],backgroundColor:colors[ci%colors.length]+'28',pointBackgroundColor:colors[ci%colors.length],borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,
        scales:{r:{min:0,max:10,ticks:{color:'#8898bb',font:{family:'Nunito',size:9},stepSize:2,backdropColor:'transparent'},grid:{color:'rgba(150,170,210,0.2)'},pointLabels:{color:'#4a5a80',font:{family:'Nunito',weight:'700',size:10}}}},
        plugins:{legend:{display:false}}
      }
    }));
  });
  CATS.forEach(cat=>{
    const el=document.getElementById(`res-${cat.key}`);if(!el)return;
    const ds=cids.map((cid,i)=>({
      label:cid,data:TS.map((_,ti)=>mediaClase(cid,ti,cat.key)),
      backgroundColor:colors[i%colors.length]+'bb',borderColor:colors[i%colors.length],borderWidth:1.5,borderRadius:6,
    }));
    charts.push(new Chart(el,{type:'bar',data:{labels:TS,datasets:ds},options:gOpts}));
  });
}

// ══════════════════════════════════════════════════════════════
// BIND EVENTS
// ══════════════════════════════════════════════════════════════
let saveSimpleTimer=null;

function bind(){
  document.getElementById('btn-back')?.addEventListener('click',()=>{S.ae=null;render();});
  document.getElementById('btn-prev')?.addEventListener('click',()=>{
    const als=alumnos();const i=als.findIndex(a=>a.id===S.ae);
    if(i>0){S.ae=als[i-1].id;render();}
  });
  document.getElementById('btn-next')?.addEventListener('click',()=>{
    const als=alumnos();const i=als.findIndex(a=>a.id===S.ae);
    if(i<als.length-1){S.ae=als[i+1].id;render();}
  });
  document.querySelectorAll('.arow[data-id]').forEach(el=>{
    el.addEventListener('click',()=>{S.ae=parseInt(el.dataset.id);render();});
  });

  // Notas simples — guardar con debounce sin re-render
  document.querySelectorAll('.nsimple').forEach(inp=>{
    inp.addEventListener('input',()=>{
      S._inputting=true;
      const cat=inp.dataset.cat;
      const c=curso();if(!c)return;
      c.notas[S.ae]=c.notas[S.ae]||{};
      c.notas[S.ae][S.ta]=c.notas[S.ae][S.ta]||defN();
      c.notas[S.ae][S.ta][cat]=inp.value;
      clearTimeout(saveSimpleTimer);
      window._db?.setStatus('saving');
      saveSimpleTimer=setTimeout(()=>{
        S._inputting=false;
        window._db?.scheduleSave(S.ca);
      },1500);
    });
  });

  // Notas multi — actualizar media en vivo, guardar con debounce
  document.querySelectorAll('.nmulti').forEach(inp=>{
    inp.addEventListener('input',()=>{
      S._inputting=true;
      const cat=inp.dataset.cat;const idx=parseInt(inp.dataset.idx);
      const c=curso();if(!c)return;
      c.notas[S.ae]=c.notas[S.ae]||{};
      c.notas[S.ae][S.ta]=c.notas[S.ae][S.ta]||defN();
      const arr=[...(c.notas[S.ae][S.ta][cat]||[])];
      arr[idx]=inp.value;
      c.notas[S.ae][S.ta][cat]=arr;
      // actualizar media en vivo
      const med=calcMedia(arr);
      const medEl=inp.closest('.catb').querySelector('.cmedia');
      if(med!==null){
        if(medEl)medEl.textContent=`Media: ${fmt(med)}`;
        else{const h=inp.closest('.catb').querySelector('.cath');const s=document.createElement('span');s.className='cmedia';s.textContent=`Media: ${fmt(med)}`;h.appendChild(s);}
      }else if(medEl)medEl.textContent='';
      clearTimeout(saveSimpleTimer);
      window._db?.setStatus('saving');
      saveSimpleTimer=setTimeout(()=>{
        S._inputting=false;
        window._db?.scheduleSave(S.ca);
      },1500);
    });
  });

  document.querySelectorAll('.btnadd').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cat=btn.dataset.cat;
      setN(S.ae,S.ta,n=>{n[cat]=[...(n[cat]||[]),''];});
    });
  });
  document.querySelectorAll('.btnrm').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cat=btn.dataset.cat;const idx=parseInt(btn.dataset.idx);
      setN(S.ae,S.ta,n=>{n[cat]=(n[cat]||[]).filter((_,i)=>i!==idx);});
    });
  });
  document.querySelectorAll('[data-trim]').forEach(b=>{
    b.addEventListener('click',()=>{S.ta=parseInt(b.dataset.trim);render();});
  });
  document.getElementById('btn-addal')?.addEventListener('click',()=>openModal('alumno'));
  document.getElementById('btn-vaciarcl')?.addEventListener('click',()=>openModal('vaciar'));
  document.querySelectorAll('.at[data-alid]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=parseInt(btn.dataset.alid);
      S.agraf[id]=!S.agraf[id];render();
    });
  });
}

// ── MODAL ─────────────────────────────────────────────────────
let mmode='';
function openModal(mode){
  mmode=mode;
  const t=document.getElementById('mt');
  const p=document.getElementById('mp');
  const inp=document.getElementById('mi');
  const ok=document.getElementById('mok');
  inp.style.display='block';p.style.display='none';
  if(mode==='curso'){t.textContent='Nuevo curso';inp.placeholder='Ej: 1º';ok.textContent='Crear';}
  else if(mode==='alumno'){t.textContent=`Añadir alumno — ${S.ca}`;inp.placeholder='Apellidos, Nombre';ok.textContent='Añadir';}
  else if(mode==='vaciar'){
    t.textContent='Vaciar clase';
    p.textContent=`Se eliminarán todos los alumnos y notas de ${S.ca}. Esta acción no se puede deshacer.`;
    p.style.display='block';inp.style.display='none';ok.textContent='Sí, vaciar';
  }
  inp.value='';
  document.getElementById('modal').style.display='flex';
  if(mode!=='vaciar')setTimeout(()=>inp.focus(),60);
}
function closeModal(){document.getElementById('modal').style.display='none';}
function confirmModal(){
  const val=document.getElementById('mi').value.trim();
  if(mmode==='curso'){
    if(!val)return;
    S.cursos[val]={nombre:val,alumnos:[],notas:{}};
    S.ca=val;
    window._db?.startListening();
    window._db?.scheduleSave(val);
  }else if(mmode==='alumno'){
    if(!val)return;
    const c=curso();if(c){c.alumnos.push({id:uid(),nombre:val});window._db?.scheduleSave(S.ca);}
  }else if(mmode==='vaciar'){
    const c=curso();if(c){c.alumnos=[];c.notas={};S.ae=null;window._db?.scheduleSave(S.ca);}
  }
  closeModal();render();
}
document.getElementById('btn-nuevo-curso').addEventListener('click',()=>openModal('curso'));
document.getElementById('mok').addEventListener('click',confirmModal);
document.getElementById('mcancel').addEventListener('click',closeModal);
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('mi').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();});

// ── NAV ───────────────────────────────────────────────────────
function setVista(v){
  S.vista=v;S.ae=null;
  document.querySelectorAll('.nb,.bb').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  render();
}
document.querySelectorAll('.nb,.bb').forEach(b=>b.addEventListener('click',()=>setVista(b.dataset.view)));

// ── TECLADO ────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(S.ae===null)return;
  const als=alumnos();const i=als.findIndex(a=>a.id===S.ae);
  if(e.key==='ArrowRight'&&i<als.length-1){S.ae=als[i+1].id;render();}
  if(e.key==='ArrowLeft'&&i>0){S.ae=als[i-1].id;render();}
});

// ══════════════════════════════════════════════════════════════
// ARRANQUE — esperar a que Firebase esté listo
// ══════════════════════════════════════════════════════════════
function showApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='flex';
}

// Firebase carga asíncronamente; esperamos a que _db esté disponible
let waitCount=0;
function waitForFirebase(){
  if(window._db){
    window._db.loadAll().then(showApp).catch(()=>{showApp();render();});
  }else if(waitCount++<30){
    setTimeout(waitForFirebase,200);
  }else{
    // fallback sin firebase
    showApp();render();
  }
}
waitForFirebase();
</script>
